<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | RAG AI Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .card {
      background: #020617;
      padding: 30px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .footer {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    #msg {
      margin-top: 10px;
      text-align: center;
      color: #f87171;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="msg"></div>

  <div class="footer">
    No account?
    <a href="/register">Register</a>
  </div>
</div>

<script>
  async function login() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    const form = new FormData();
    form.append("username", username);
    form.append("password", password);

    const res = await fetch("/login", {
      method: "POST",
      body: form
    });

    const data = await res.json();

    if (data.status === "ok") {
      localStorage.setItem("username", username);
      window.location.href = "/chat";
    } else {
      document.getElementById("msg").innerText = "Invalid login";
    }
  }
</script>

</body>
</html>
