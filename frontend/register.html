<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | RAG AI Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #020617, #0f172a);
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .card {
      background: #020617;
      padding: 30px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: #020617;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    .footer {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Register</h2>

  <form method="POST" action="/register">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Create Account</button>
  </form>

  <div class="footer">
    Already have an account?
    <a href="/">Login</a>
  </div>
</div>

</body>
</html>
